spring.application.name=backend

# Database configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:blubblemap}
spring.datasource.username=${DB_USERNAME:bubble}
spring.datasource.password=${DB_PASSWORD:bubble}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# OpenAI configuration
openai.api.key=${OPENAI_API_KEY}
openai.api.url=https://api.openai.com/v1/chat/completions

# File upload limits (for CV uploads)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

